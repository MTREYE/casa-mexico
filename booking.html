  <!-- BODY SECTION -->
  <section class="section booking">

  	<!-- FORM -->
  	<div class="container">
  		<h2 class="booking-title">BOOK A TABLE</h2>

	  	<form id="bookingForm">

	  		<!-- date -->
	  		<div class="mb-3">
	  			<label for="date" class="form-label">Date</label>
	  			<input type="date" class="form-control" id="date" min="2026-04-12">
	  		</div>

	  		<!-- time -->
	  		<div class="mb-3">
	  			<label for="time" class="form-label">Time</label>
	  			<input type="time" class="form-control" id="time" min="12:00" max="21:00">
	  		</div>

	  		<!-- people -->
	  		<div class="mb-3">
	  			<label for="people" class="form-label">Number of People</label>
	  			<input type="number" class="form-control" id="people" min="1" max="20">
	  		</div>

	  		<!-- name -->
	  		<div class="mb-3">
	  			<label for="name" class="form-label">Name</label>
	  			<input type="text" class="form-control" id="name">
	  		</div>

	  		<!-- email -->
	  		<div class="mb-3">
	  			<label for="email" class="form-label">Email</label>
	  			<input type="text" class="form-control" id="email">
	  		</div>

				<button type="submit" class="btn-custom btn-primary-custom">BOOK NOW</button>
			</form>
		</div>

  </section>
